<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Interview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">InterviewAI</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse.html">Practice</a>
      <a href="cv-ai.html">CV Analysis</a>
      <a href="history.html">History</a>
      <a href="progress.html">Progress</a>

      <div class="auth-area">
        <a href="login.html" class="btn-outline" id="loginBtn">Login</a>
        <a href="register.html" class="btn-primary" id="signupBtn">Sign Up</a>

        <div id="userMenu" style="display: none">
          <span id="usernameDisplay"></span>
          <button onclick="logout()" class="btn-outline">Logout</button>
        </div>
      </div>
    </div>
  </nav>

<!-- PROFILE -->
<div class="profile-container">

    <h1 class="page-title">My Profile</h1>

    <!-- INFO -->
    <div class="profile-card">
        <h3>Account Info</h3>

        <div class="form-group">
            <label>Username</label>
            <input id="username">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input id="email">
        </div>

        <button class="btn-primary" onclick="updateProfile()">
            Update Profile
        </button>
    </div>

    <!-- PASSWORD -->
    <div class="profile-card">
        <h3>Change Password</h3>

        <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="oldPassword">
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword">
        </div>

        <button class="btn-primary" onclick="changePassword()">
            Change Password
        </button>
    </div>

</div>

<script src="js/profile.js"></script>
<script src="/js/auth.js"></script>
<script>
        checkLoginUI();
    </script>
</body>
</html>
