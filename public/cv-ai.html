<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CV Analysis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">InterviewAI</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse.html">Practice</a>
            <a href="cv-ai.html">CV Analysis</a>
            <a href="history.html" class="active-link">History</a>
            <a href="progress.html">Progress</a>
            <a href="feedback.html">FeedBack</a>

            <div class="auth-area" id="userArea">
                <a href="login.html" class="btn-outline" id="loginBtn">Login</a>
                <a href="register.html" class="btn-primary" id="signupBtn">Sign Up</a>

                <div id="userMenu" style="display: none">
                    <span id="usernameDisplay"></span>
                    <button onclick="logout()" class="btn-outline">Logout</button>
                </div>
            </div>
        </div>
    </nav>


    <!-- CONTENT -->
    <section class="cv-ai">
        <h2>CV & JD Analysis</h2>

        <div class="upload-box" id="uploadBox">
            <input type="file" id="cvFile" accept=".pdf,.txt" hidden />

            <div class="upload-content">
                <p>Drag & drop CV here</p>
                <button type="button" onclick="document.getElementById('cvFile').click()">
                    Choose File
                </button>
                <p id="fileName">No file selected</p>
            </div>
        </div>

        <textarea id="jd" placeholder="Paste Job Description here..."></textarea>

        <button onclick="generateFromCVJD()">Start Analysis</button>

        <div id="cvQuestionList"></div>
    </section>

    <script src="/js/cv-ai.js"></script>
</body>

</html>
